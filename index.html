<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>體驗方案分類平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
</style>
</head>
<body class="bg-gray-50">

<header class="sticky top-0 z-30 border-b bg-white p-4">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <div class="flex items-center gap-2 font-bold text-lg">奇麗灣珍奶文化館</div>
  </div>
</header>

<section class="max-w-7xl mx-auto p-4">
  <h1 class="text-3xl font-bold mb-4">暢遊奇麗灣 一站式體驗活動</h1>

  <!-- 搜尋 -->
  <input id="keyword" type="text" placeholder="輸入關鍵字" class="w-full mb-4 rounded-xl border px-3 py-2">

  <!-- 族群按鈕 -->
  <div id="audienceBtns" class="flex flex-wrap gap-2 mb-4"></div>

  <!-- 子分類按鈕 -->
  <div id="subBtns" class="flex flex-wrap gap-2 mb-4"></div>

  <!-- 篩選 -->
  <div class="flex gap-4 mb-4">
    <label class="flex flex-col text-sm text-gray-600">
      價格上限
      <input id="priceCap" type="range" min="500" max="3000" step="100" value="2500" class="w-full">
      <span id="priceCapVal">2500</span>
    </label>
    <label class="flex flex-col text-sm text-gray-600">
      時長下限（分鐘）
      <select id="minDuration" class="rounded border px-2 py-1">
        <option value="0">不限</option>
        <option value="60">≥ 60 分鐘</option>
        <option value="90">≥ 90 分鐘</option>
        <option value="120">≥ 120 分鐘</option>
        <option value="180">≥ 180 分鐘</option>
        <option value="240">≥ 240 分鐘</option>
      </select>
    </label>
  </div>

  <!-- 卡片區 -->
  <div id="cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
</section>

<script>
// 假資料
const EXPERIENCES = [
  {id:"exp1",title:"珍奶DIY手作課",audience:"親子",subcategory:"DIY 手作",price:650,duration:90,location:"宜蘭・蘇澳",rating:4.7,description:"跟著老師從泡茶到搖珍奶，孩子動手做最有成就感！含材料、成品帶回家。",cover:"https://via.placeholder.com/400x200?text=珍奶DIY手作課"},
  {id:"exp2",title:"團體場地租借",audience:"親子",subcategory:"會議、宴會",price:950,duration:120,location:"宜蘭・蘇澳",rating:4.8,description:"是您辦活動絕佳的場地選擇。",cover:"https://via.placeholder.com/400x200?text=場地租借"},
  {id:"exp3",title:"團隊解謎闖關（室內）",audience:"團體",subcategory:"團隊合作挑戰",price:1200,duration:90,location:"宜蘭・蘇澳",rating:4.6,description:"沉浸式劇情與謎題，強化團隊溝通、破冰與分工，適合10-40人。",cover:"https://via.placeholder.com/400x200?text=團隊解謎"},
  {id:"exp4",title:"企業員旅一日遊：海景步道 + 在地美食",audience:"團體",subcategory:"企業員工旅遊",price:2200,duration:420,location:"宜蘭・蘇澳",rating:4.5,description:"會議、導覽與在地海鮮午餐，放鬆同時促進同事交流。",cover:"https://via.placeholder.com/400x200?text=企業員旅"},
  {id:"exp5",title:"樂齡舒展太極 + 茶席體驗",audience:"老人",subcategory:"健康樂活",price:800,duration:60,location:"宜蘭・蘇澳",rating:4.9,description:"專業老師帶領太極舒展，課後慢品在地好茶，放鬆身心。",cover:"https://via.placeholder.com/400x200?text=樂齡太極"},
  {id:"exp6",title:"藝文輕旅：博物館導覽 + 手作拓印",audience:"老人",subcategory:"藝文休閒",price:1100,duration:150,location:"宜蘭・蘇澳",rating:4.7,description:"步行友善、椅座休息點充足，文史導覽後動手做紀念拓印。",cover:"https://via.placeholder.com/400x200?text=藝文輕旅"}
];

const AUDIENCES = {
  "親子": ["DIY 手作", "自然探索", "教育寓教於樂", "親子休閒"],
  "團體": ["團隊合作挑戰", "企業員工旅遊", "學校/社團活動", "戶外運動 / 冒險"],
  "老人": ["健康樂活", "輕鬆旅遊", "藝文休閒", "養生課程"]
};

let currentAudience = "親子";
let currentSub = "";
let keyword = "";
let priceCap = 2500;
let minDuration = 0;

const audienceBtns = document.getElementById("audienceBtns");
const subBtns = document.getElementById("subBtns");
const cardsDiv = document.getElementById("cards");
const keywordInput = document.getElementById("keyword");
const priceInput = document.getElementById("priceCap");
const priceVal = document.getElementById("priceCapVal");
const durationSelect = document.getElementById("minDuration");

// 生成族群按鈕
function renderAudienceButtons() {
  audienceBtns.innerHTML = "";
  Object.keys(AUDIENCES).forEach(a => {
    const btn = document.createElement("button");
    btn.textContent = a;
    btn.className = `rounded-xl border px-3 py-1.5 text-sm ${currentAudience === a ? "border-black bg-black text-white" : "hover:bg-gray-100"}`;
    btn.onclick = () => { currentAudience = a; currentSub = ""; renderAudienceButtons(); renderSubButtons(); renderCards(); };
    audienceBtns.appendChild(btn);
  });
}

// 生成子分類按鈕
function renderSubButtons() {
  subBtns.innerHTML = "";
  const allBtn = document.createElement("button");
  allBtn.textContent = "全部";
  allBtn.className = `rounded-xl border px-3 py-1.5 text-sm ${currentSub === "" ? "border-black bg-black text-white" : "hover:bg-gray-100"}`;
  allBtn.onclick = () => { currentSub = ""; renderSubButtons(); renderCards(); };
  subBtns.appendChild(allBtn);

  AUDIENCES[currentAudience].forEach(s => {
    const btn = document.createElement("button");
    btn.textContent = s;
    btn.className = `rounded-xl border px-3 py-1.5 text-sm ${currentSub === s ? "border-black bg-black text-white" : "hover:bg-gray-100"}`;
    btn.onclick = () => { currentSub = s; renderSubButtons(); renderCards(); };
    subBtns.appendChild(btn);
  });
}

// 渲染卡片
function renderCards() {
  cardsDiv.innerHTML = "";
  const filtered = EXPERIENCES.filter(e => 
    e.audience === currentAudience &&
    (currentSub === "" || e.subcategory === currentSub) &&
    e.price <= priceCap &&
    e.duration >= minDuration &&
    (keyword === "" || (e.title + e.description + e.location).toLowerCase().includes(keyword.toLowerCase()))
  );

  if(filtered.length === 0) {
    cardsDiv.innerHTML = `<div class="p-8 text-gray-600 col-span-full text-center border rounded-2xl">目前沒有符合條件的方案</div>`;
    return;
  }

  filtered.forEach(item => {
    const div = document.createElement("div");
    div.className = "rounded-2xl border bg-white shadow-sm overflow-hidden flex flex-col";
    div.innerHTML = `
      <img src="${item.cover}" alt="${item.title}" class="w-full h-40 object-cover">
      <div class="p-4 flex flex-col flex-1 gap-2">
        <h3 class="line-clamp-1 font-semibold text-lg">${item.title}</h3>
        <p class="line-clamp-2 text-sm text-gray-600">${item.description}</p>
        <div class="mt-auto flex justify-between text-sm items-center">
          <span class="font-medium">$${item.price}</span>
          <span class="text-gray-600">⏱ ${item.duration}分</span>
        </div>
      </div>
    `;
    cardsDiv.appendChild(div);
  });
}

// 事件
keywordInput.addEventListener("input", e => { keyword = e.target.value; renderCards(); });
priceInput.addEventListener("input", e => { priceCap = Number(e.target.value); priceVal.textContent = priceCap; renderCards(); });
durationSelect.addEventListener("change", e => { minDuration = Number(e.target.value); renderCards(); });

// 初始化
renderAudienceButtons();
renderSubButtons();
renderCards();
</script>

</body>
</html>
